kind: starter-template
id: automation-migration-ts
projectDir: .
title: "Automation Migration (TypeScript)"
description: "Migrate Chainlink Automation time-based, custom logic, and log trigger upkeeps to CRE using a reusable receiver bridge."
language: typescript
category: workflow
capabilities:
  - cron
  - log-trigger
  - chain-read
  - chain-write
tags:
  - automation
  - upkeep
  - migration
  - bridge
networks:
  - ethereum-testnet-sepolia
workflows:
  - dir: my-workflow
    description: "Automation upkeep migration workflow"
postInit: |
  Deploy AutomationReceiver.sol, authorize it in any legacy target contract permission checks, update my-workflow/config.test.json, then run bun install inside my-workflow before simulating.

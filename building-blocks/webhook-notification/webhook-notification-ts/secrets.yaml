# Vault secret names mapped to environment variables.
# This file is referenced from workflow.yaml and used during simulation.
#
# For webhook notifications, the credential is embedded in the webhook URL
# (e.g., Slack incoming webhook URL or Telegram bot token in the URL path).
# The ConfidentialHTTPClient ensures the URL is processed inside a secure
# enclave and never exposed to the node operator.
#
# If your use case requires secrets in request headers or body, you can
# declare them here and use {{.secretName}} templates. For example:
#
#   secretsNames:
#     myApiKey:
#       - MY_API_KEY_ENV_VAR
#
# Then in your request headers:
#   'Authorization': { values: ['Bearer {{.myApiKey}}'] }
secretsNames: {}

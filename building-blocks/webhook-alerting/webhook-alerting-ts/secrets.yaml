# Vault secret names mapped to environment variables.
# This file is referenced from workflow.yaml and used during simulation.
#
# The pagerdutyRoutingKey secret is injected into the request body via the
# {{.pagerdutyRoutingKey}} template. During simulation the value is read from
# the PAGERDUTY_ROUTING_KEY env var (set in .env). In production the enclave
# fetches the real secret from VaultDON.
secretsNames:
  pagerdutyRoutingKey:
    - PAGERDUTY_ROUTING_KEY

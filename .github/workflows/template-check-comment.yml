name: Template Check Comment

# Triggered when the unprivileged "Template Check" workflow completes.
# This workflow has pull-requests: write so it can post PR comments.
# It checks out the default branch (only) to load scripts/template-check-comment.js,
# then reads the artifact produced by the check workflow.
#
# SECURITY: workflow_run always runs on the default branch, so this workflow
# definition and checked-out script cannot be tampered with by a PR contributor.
# Artifact contents are treated as untrusted strings and sanitised before use.

on:
  workflow_run:
    workflows: ["Template Check"]
    types: [completed]

permissions:
  contents: read
  pull-requests: write
  actions: read # required to download artifacts from another workflow run

jobs:
  post-comment:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Download results artifact
        uses: actions/download-artifact@v4
        with:
          name: template-check-results
          path: /tmp/check-results
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Post or remove PR comment
        uses: actions/github-script@v8
        with:
          script: |
            const path = require('path');
            const run = require(path.join(process.env.GITHUB_WORKSPACE, 'scripts', 'template-check-comment.js'));
            await run({ github, context });
